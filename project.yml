name: HorongHorong
options:
  bundleIdPrefix: com.horonghorong
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"

packages:
  HotKey:
    url: https://github.com/soffes/HotKey.git
    from: "0.2.1"
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.9.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    MARKETING_VERSION: "0.1.1"
    CURRENT_PROJECT_VERSION: "4"

schemes:
  HorongHorong:
    build:
      targets:
        HorongHorong: all
    test:
      targets:
        - HorongHorongTests
    run:
      config: Debug
    archive:
      config: Release
  HorongHorongAppStore:
    build:
      targets:
        HorongHorongAppStore: all
    run:
      config: Debug
    archive:
      config: Release

targets:
  HorongHorong:
    type: application
    platform: macOS
    configFiles:
      Debug: HorongHorong/Config/Base.xcconfig
      Release: HorongHorong/Config/Base.xcconfig
    sources:
      - path: HorongHorong
        excludes:
          - "**/*.entitlements"
          - "Info-AppStore.plist"
    settings:
      base:
        INFOPLIST_FILE: HorongHorong/Info.plist
        CODE_SIGN_ENTITLEMENTS: HorongHorong/HorongHorong.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.horonghorong.app
        PRODUCT_NAME: 호롱호롱
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGNING_ALLOWED: "NO"
        ENABLE_APP_SANDBOX: "NO"
        OTHER_SWIFT_FLAGS: "$(inherited) -DDIRECT_DISTRIBUTION"
        SWIFT_STRICT_CONCURRENCY: minimal
        SWIFT_VERSION: "6.0"
    dependencies:
      - package: HotKey
      - package: Sparkle
    postCompileScripts:
      - name: Copy News Runner Resources
        script: |
          set -euo pipefail
          SRC="${PROJECT_DIR}/Agents/news_report"
          DST="${TARGET_BUILD_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/news_report"
          if [ ! -d "$SRC" ]; then
            echo "warning: News runner source not found: $SRC"
            exit 0
          fi
          mkdir -p "$DST"
          rsync -a --delete \
            --exclude '.venv' \
            --exclude '__pycache__' \
            --exclude '*.pyc' \
            --exclude '.DS_Store' \
            --exclude 'data' \
            "$SRC/" "$DST/"

  HorongHorongAppStore:
    type: application
    platform: macOS
    configFiles:
      Debug: HorongHorong/Config/Base.xcconfig
      Release: HorongHorong/Config/Base.xcconfig
    sources:
      - path: HorongHorong
        excludes:
          - "**/*.entitlements"
          - "Info.plist"
          - "Services/AppUpdate/**"
    settings:
      base:
        INFOPLIST_FILE: HorongHorong/Info-AppStore.plist
        CODE_SIGN_ENTITLEMENTS: HorongHorong/HorongHorong.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.horonghorong.app
        PRODUCT_NAME: 호롱호롱
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGNING_ALLOWED: "NO"
        ENABLE_APP_SANDBOX: "YES"
        SWIFT_STRICT_CONCURRENCY: minimal
        SWIFT_VERSION: "6.0"
    dependencies:
      - package: HotKey
    postCompileScripts:
      - name: Copy News Runner Resources
        script: |
          set -euo pipefail
          SRC="${PROJECT_DIR}/Agents/news_report"
          DST="${TARGET_BUILD_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/news_report"
          if [ ! -d "$SRC" ]; then
            echo "warning: News runner source not found: $SRC"
            exit 0
          fi
          mkdir -p "$DST"
          rsync -a --delete \
            --exclude '.venv' \
            --exclude '__pycache__' \
            --exclude '*.pyc' \
            --exclude '.DS_Store' \
            --exclude 'data' \
            "$SRC/" "$DST/"

  HorongHorongTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: HorongHorongTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.horonghorong.app.tests
        CODE_SIGNING_ALLOWED: "NO"
        SWIFT_VERSION: "6.0"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/호롱호롱.app/Contents/MacOS/호롱호롱"
        BUNDLE_LOADER: "$(TEST_HOST)"
    dependencies:
      - target: HorongHorong
