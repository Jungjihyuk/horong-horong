name: HorongHorong
options:
  bundleIdPrefix: com.horonghorong
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"

packages:
  HotKey:
    url: https://github.com/soffes/HotKey.git
    from: "0.2.1"

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

schemes:
  HorongHorong:
    build:
      targets:
        HorongHorong: all
    test:
      targets:
        - HorongHorongTests
    run:
      config: Debug
    archive:
      config: Release

targets:
  HorongHorong:
    type: application
    platform: macOS
    sources:
      - path: HorongHorong
        excludes:
          - "**/*.entitlements"
    settings:
      base:
        INFOPLIST_FILE: HorongHorong/Info.plist
        CODE_SIGN_ENTITLEMENTS: HorongHorong/HorongHorong.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.horonghorong.app
        PRODUCT_NAME: 호롱호롱
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGNING_ALLOWED: "NO"
        ENABLE_APP_SANDBOX: "NO"
        SWIFT_STRICT_CONCURRENCY: minimal
        SWIFT_VERSION: "6.0"
    dependencies:
      - package: HotKey

  HorongHorongTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: HorongHorongTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.horonghorong.app.tests
        CODE_SIGNING_ALLOWED: "NO"
        SWIFT_VERSION: "6.0"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/호롱호롱.app/Contents/MacOS/호롱호롱"
        BUNDLE_LOADER: "$(TEST_HOST)"
    dependencies:
      - target: HorongHorong
